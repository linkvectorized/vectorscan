<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorScan Security Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-card: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --critical: #f85149;
            --high: #d29922;
            --medium: #e3b341;
            --low: #3fb950;
            --info: #58a6ff;
            --enabled: #bc8cff;
            --accent: #238636;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
        }

        .header-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            flex: 1;
            min-width: 0;
            flex-wrap: wrap;
        }

        .meta-item {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 6px 12px;
            background-color: var(--accent);
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2ea043;
        }

        button:active {
            background-color: #238636;
        }

        /* Main container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        /* KPI Cards */
        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border-left: 4px solid;
        }

        .kpi-card.critical { border-left-color: var(--critical); }
        .kpi-card.high { border-left-color: var(--high); }
        .kpi-card.medium { border-left-color: var(--medium); }
        .kpi-card.low { border-left-color: var(--low); }
        .kpi-card.info { border-left-color: var(--info); }
        .kpi-card.enabled { border-left-color: var(--enabled); }

        .kpi-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            display: inline-block;
            min-width: 50px;
        }

        .critical .kpi-value { color: var(--critical); }
        .high .kpi-value { color: var(--high); }
        .medium .kpi-value { color: var(--medium); }
        .low .kpi-value { color: var(--low); }
        .info .kpi-value { color: var(--info); }
        .enabled .kpi-value { color: var(--enabled); }

        /* Charts section */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .chart-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            position: relative;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        #scoreGauge {
            max-width: 200px;
            margin: 0 auto;
        }

        /* Table section */
        .table-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .table-toolbar {
            display: flex;
            gap: 12px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input, .filter-select {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .table-info {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .table-wrapper {
            max-height: 600px;
            overflow-y: auto;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:hover {
            background-color: var(--border-color);
        }

        .sort-indicator {
            font-size: 10px;
            margin-left: 4px;
            opacity: 0.5;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        tbody tr {
            border-left: 3px solid transparent;
            transition: background-color 0.15s;
        }

        tbody tr:hover {
            background-color: var(--border-color);
        }

        tr.critical { border-left-color: var(--critical); }
        tr.high { border-left-color: var(--high); }
        tr.medium { border-left-color: var(--medium); }
        tr.low { border-left-color: var(--low); }
        tr.info { border-left-color: var(--info); }
        tr.passed { border-left-color: var(--low); opacity: 0.6; }
        tr.skipped { border-left-color: var(--text-secondary); opacity: 0.5; }

        .severity-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .severity-critical { background-color: rgba(248, 81, 73, 0.15); color: var(--critical); }
        .severity-high { background-color: rgba(210, 153, 34, 0.15); color: var(--high); }
        .severity-medium { background-color: rgba(227, 179, 65, 0.15); color: var(--medium); }
        .severity-low { background-color: rgba(63, 185, 80, 0.15); color: var(--low); }
        .severity-info { background-color: rgba(88, 166, 255, 0.15); color: var(--info); }

        .expand-toggle {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            width: 16px;
        }

        .detail-row {
            display: none;
        }

        .detail-row.expanded {
            display: table-row;
        }

        .detail-cell {
            padding: 16px !important;
        }

        .detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .detail-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .detail-value {
            color: var(--text-primary);
        }

        .evidence-code {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-meta {
                width: 100%;
                flex-direction: column;
                gap: 8px;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }

            .detail-content {
                grid-template-columns: 1fr;
            }

            .table-toolbar {
                flex-direction: column;
            }

            .table-info {
                margin-left: 0;
            }
        }

        /* Print styles */
        @media print {
            header .header-actions {
                display: none;
            }

            body {
                background-color: white;
                color: black;
            }

            .chart-container, .table-section {
                background-color: white;
                border-color: #ccc;
                page-break-inside: avoid;
            }

            .detail-row {
                display: table-row !important;
            }

            th, td {
                border-color: #ccc;
            }

            .severity-badge {
                border: 1px solid black;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">VectorScan</div>
        <div class="header-meta">
            <div class="meta-item"><strong>Host:</strong> <span id="metaHostname">-</span></div>
            <div class="meta-item"><strong>Platform:</strong> <span id="metaPlatform">-</span></div>
            <div class="meta-item"><strong>OS:</strong> <span id="metaOS">-</span></div>
            <div class="meta-item"><strong>Date:</strong> <span id="metaDate">-</span></div>
            <div class="meta-item"><strong>Duration:</strong> <span id="metaDuration">-</span></div>
        </div>
        <div class="header-actions">
            <button onclick="exportPDF()">📄 PDF</button>
            <button onclick="exportCSV()">📊 CSV</button>
            <button onclick="exportJSON()">⚙️ JSON</button>
        </div>
    </header>

    <div class="container">
        <!-- KPI Cards -->
        <div class="kpi-section">
            <div class="kpi-card critical">
                <div class="kpi-label">Critical</div>
                <div class="kpi-value" id="kpiCritical">0</div>
            </div>
            <div class="kpi-card high">
                <div class="kpi-label">High</div>
                <div class="kpi-value" id="kpiHigh">0</div>
            </div>
            <div class="kpi-card medium">
                <div class="kpi-label">Medium</div>
                <div class="kpi-value" id="kpiMedium">0</div>
            </div>
            <div class="kpi-card low">
                <div class="kpi-label">Low</div>
                <div class="kpi-value" id="kpiLow">0</div>
            </div>
            <div class="kpi-card info">
                <div class="kpi-label">Info</div>
                <div class="kpi-value" id="kpiInfo">0</div>
            </div>
            <div class="kpi-card enabled">
                <div class="kpi-label">Enabled</div>
                <div class="kpi-value" id="kpiEnabled">0</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-section">
            <div class="chart-container">
                <div class="chart-title">Security Score</div>
                <canvas id="scoreGauge"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">Severity Distribution</div>
                <canvas id="severityChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">Findings by Category</div>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- Findings Table -->
        <div class="table-section">
            <div class="table-toolbar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search findings...">
                <select class="filter-select" id="severityFilter">
                    <option value="">All Severities</option>
                    <option value="CRITICAL">Critical</option>
                    <option value="HIGH">High</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                    <option value="INFO">Info</option>
                </select>
                <select class="filter-select" id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
                        <select class="filter-select" id="statusFilter">
                    <option value="issues">Issues Only</option>
                    <option value="">All</option>
                    <option value="passed">Passing</option>
                    <option value="skipped">Skipped</option>
                </select>
                <div class="table-info">Showing <span id="tableShowing">0</span> of <span id="tableTotal">0</span> findings</div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th onclick="toggleSort('id')" style="width: 80px;">ID <span class="sort-indicator" id="sort-id"></span></th>
                            <th onclick="toggleSort('severity')" style="width: 90px;">Severity <span class="sort-indicator" id="sort-severity"></span></th>
                            <th onclick="toggleSort('category')" style="width: 100px;">Category <span class="sort-indicator" id="sort-category"></span></th>
                            <th onclick="toggleSort('title')">Title <span class="sort-indicator" id="sort-title"></span></th>
                            <th onclick="toggleSort('timestamp')" style="width: 140px;">Time <span class="sort-indicator" id="sort-timestamp"></span></th>
                        </tr>
                    </thead>
                    <tbody id="findingsTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let reportData = null;
        let filteredFindings = [];
        let sortColumn = 'severity';
        let sortAsc = true;

        const SEVERITY_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, INFO: 4 };

        async function init() {
            try {
                await loadReport();
                populateMetadata();
                updateKPIs();
                drawGauge();
                populateCategoryFilter();
                initSeverityChart();
                initCategoryChart();
                applyFilters();
                attachEventListeners();
            } catch (err) {
                console.error('Dashboard error:', err);
                document.body.innerHTML = '<div style="color: red; padding: 20px;">Failed to load report: ' + err.message + '</div>';
            }
        }

        async function loadReport() {
            const response = await fetch('/api/report');
            if (!response.ok) throw new Error('Failed to load report: ' + response.status);
            reportData = await response.json();
        }

        function populateMetadata() {
            const scanDate = new Date(reportData.scan_date);
            document.getElementById('metaHostname').textContent = reportData.hostname || '-';
            document.getElementById('metaPlatform').textContent = reportData.platform || '-';
            document.getElementById('metaOS').textContent = reportData.os_version || '-';
            document.getElementById('metaDate').textContent = scanDate.toLocaleString();
            document.getElementById('metaDuration').textContent = formatDuration(reportData.scan_time_ms || 0);
        }

        function formatDuration(ms) {
            if (!ms || ms <= 0) return '-';
            if (ms < 1000) return Math.round(ms) + 'ms';
            if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
            return (ms / 60000).toFixed(1) + 'm';
        }

        function updateKPIs() {
            animateCount('kpiCritical', reportData.critical);
            animateCount('kpiHigh', reportData.high);
            animateCount('kpiMedium', reportData.medium);
            animateCount('kpiLow', reportData.low);
            animateCount('kpiInfo', reportData.info);
            animateCount('kpiEnabled', reportData.enabled);
        }

        function animateCount(elementId, target) {
            const el = document.getElementById(elementId);
            let current = 0;
            const increment = Math.max(1, Math.ceil(target / 20));
            const interval = setInterval(() => {
                current += increment;
                if (current >= target) {
                    el.textContent = target;
                    clearInterval(interval);
                } else {
                    el.textContent = current;
                }
            }, 30);
        }

        function drawGauge() {
            const score = reportData.security_score;
            // Extract just the first word e.g. "Good (75%+ ...)" -> "GOOD"
            const levelWord = (reportData.security_level || '').split(/[\s(]/)[0].toUpperCase() || 'N/A';

            const canvas = document.getElementById('scoreGauge');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const size = Math.min(180, canvas.offsetWidth - 20);
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.scale(dpr, dpr);

            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 12;

            // Background ring
            ctx.strokeStyle = '#30363d';
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.stroke();

            // Score arc
            const startAngle = -Math.PI / 2;
            const endAngle = startAngle + (score / 100) * Math.PI * 2;
            const gradient = ctx.createLinearGradient(centerX - radius, centerY, centerX + radius, centerY);
            gradient.addColorStop(0, '#f85149');
            gradient.addColorStop(0.33, '#d29922');
            gradient.addColorStop(0.66, '#e3b341');
            gradient.addColorStop(1, '#3fb950');
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.stroke();

            // Score number
            ctx.fillStyle = '#c9d1d9';
            ctx.font = 'bold 36px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(score, centerX, centerY - 12);

            // "Status:" label
            ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.fillStyle = '#8b949e';
            ctx.fillText('Status:', centerX, centerY + 10);

            // Level word — coloured by severity
            const levelColours = { EXCELLENT: '#3fb950', GOOD: '#3fb950', FAIR: '#e3b341', POOR: '#d29922', CRITICAL: '#f85149' };
            ctx.font = 'bold 13px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.fillStyle = levelColours[levelWord] || '#8b949e';
            ctx.fillText(levelWord, centerX, centerY + 26);
        }

        function populateCategoryFilter() {
            // Only include categories that have issues (non-passed, non-skipped)
            const issues = reportData.findings.filter(f => !f.passed && !f.skipped);
            const categories = [...new Set(issues.map(f => f.category))].sort();
            const select = document.getElementById('categoryFilter');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                select.appendChild(option);
            });
        }

        function initSeverityChart() {
            if (typeof Chart === 'undefined') return;
            const ctx = document.getElementById('severityChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Critical', 'High', 'Medium', 'Low', 'Info'],
                    datasets: [{
                        data: [reportData.critical, reportData.high, reportData.medium, reportData.low, reportData.info],
                        backgroundColor: ['#f85149', '#d29922', '#e3b341', '#3fb950', '#58a6ff'],
                        borderColor: '#161b22',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'right', labels: { color: '#c9d1d9', font: { size: 12 }, padding: 12 } }
                    }
                }
            });
        }

        function initCategoryChart() {
            if (typeof Chart === 'undefined') return;

            // Chart shows only active issues, not passed/skipped
            const categories = {};
            reportData.findings.filter(f => !f.passed && !f.skipped).forEach(f => {
                categories[f.category] = (categories[f.category] || 0) + 1;
            });

            const sortedCats = Object.entries(categories).sort((a, b) => b[1] - a[1]);
            const ctx = document.getElementById('categoryChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedCats.map(([cat]) => cat.charAt(0).toUpperCase() + cat.slice(1)),
                    datasets: [{
                        label: 'Issues',
                        data: sortedCats.map(([, n]) => n),
                        backgroundColor: '#58a6ff',
                        borderColor: '#238636',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } },
                        y: { ticks: { color: '#8b949e' } }
                    }
                }
            });
        }

        function rowClass(f) {
            if (f.skipped) return 'skipped';
            if (f.passed) return 'passed';
            return f.severity.toLowerCase();
        }

        function renderTable() {
            const tbody = document.getElementById('findingsTable');
            tbody.innerHTML = '';

            filteredFindings.forEach((f, idx) => {
                const cls = rowClass(f);
                const severityCell = f.skipped
                    ? '<span style="color:var(--text-secondary);font-size:11px">SKIPPED</span>'
                    : f.passed
                        ? '<span style="color:var(--low);font-size:11px">✓ PASS</span>'
                        : `<span class="severity-badge severity-${f.severity.toLowerCase()}">${f.severity}</span>`;

                const tr = document.createElement('tr');
                tr.className = cls;
                tr.innerHTML = `
                    <td><span class="expand-toggle">▶</span> ${escapeHtml(f.id)}</td>
                    <td>${severityCell}</td>
                    <td>${escapeHtml(f.category)}</td>
                    <td>${escapeHtml(f.title)}</td>
                    <td>${new Date(f.timestamp).toLocaleTimeString()}</td>
                `;
                tr.onclick = () => toggleRow(idx);
                tbody.appendChild(tr);

                const detailTr = document.createElement('tr');
                detailTr.className = `detail-row ${cls}`;
                detailTr.id = `detail-${idx}`;
                detailTr.innerHTML = `
                    <td colspan="5" class="detail-cell">
                        <div class="detail-content">
                            <div class="detail-field">
                                <div class="detail-label">Description</div>
                                <div class="detail-value">${escapeHtml(f.description)}</div>
                            </div>
                            <div class="detail-field">
                                <div class="detail-label">Remediation</div>
                                <div class="detail-value">${escapeHtml(f.remediation)}</div>
                            </div>
                        </div>
                        <div class="detail-field" style="margin-top: 16px;">
                            <div class="detail-label">Evidence</div>
                            ${(f.evidence || []).map(e => `<div class="evidence-code">${escapeHtml(e)}</div>`).join('')}
                        </div>
                    </td>
                `;
                tbody.appendChild(detailTr);
            });

            document.getElementById('tableShowing').textContent = filteredFindings.length;
            document.getElementById('tableTotal').textContent = reportData.findings.length;
        }

        function toggleRow(idx) {
            const detail = document.getElementById(`detail-${idx}`);
            if (detail) detail.classList.toggle('expanded');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function toggleSort(column) {
            document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '');
            if (sortColumn === column) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = column;
                sortAsc = true;
            }

            filteredFindings.sort((a, b) => {
                let aVal = column === 'severity' ? (SEVERITY_ORDER[a.severity] ?? 99) : a[column];
                let bVal = column === 'severity' ? (SEVERITY_ORDER[b.severity] ?? 99) : b[column];
                if (column === 'timestamp') { aVal = new Date(aVal); bVal = new Date(bVal); }
                const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                return sortAsc ? cmp : -cmp;
            });

            document.getElementById(`sort-${column}`).textContent = sortAsc ? '▲' : '▼';
            renderTable();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const severity = document.getElementById('severityFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;

            filteredFindings = reportData.findings.filter(f => {
                if (status === 'issues' && (f.passed || f.skipped)) return false;
                if (status === 'passed' && !f.passed) return false;
                if (status === 'skipped' && !f.skipped) return false;
                if (severity && f.severity !== severity) return false;
                if (category && f.category !== category) return false;
                if (search && !f.title.toLowerCase().includes(search) &&
                              !f.description.toLowerCase().includes(search) &&
                              !f.id.toLowerCase().includes(search)) return false;
                return true;
            });

            // Default sort: severity ascending
            filteredFindings.sort((a, b) => {
                const sa = SEVERITY_ORDER[a.severity] ?? 99;
                const sb = SEVERITY_ORDER[b.severity] ?? 99;
                return sortAsc ? sa - sb : sb - sa;
            });

            renderTable();
        }

        function attachEventListeners() {
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('severityFilter').addEventListener('change', applyFilters);
            document.getElementById('categoryFilter').addEventListener('change', applyFilters);
            document.getElementById('statusFilter').addEventListener('change', applyFilters);
        }

        function exportCSV() {
            const headers = ['ID', 'Category', 'Severity', 'Title', 'Description', 'Remediation', 'Evidence', 'Timestamp'];
            const rows = reportData.findings.map(f => [
                f.id, f.category, f.severity, f.title, f.description, f.remediation,
                (f.evidence || []).join('; '), f.timestamp
            ]);
            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
            });
            downloadBlob(new Blob([csv], { type: 'text/csv' }), 'vectorscan-report.csv');
        }

        function exportJSON() {
            downloadBlob(new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' }), 'vectorscan-report.json');
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function exportPDF() { window.print(); }

        // Keep server alive while tab is open; server auto-shuts down after tab closes.
        function ping() { fetch('/ping', { method: 'POST' }).catch(() => {}); }
        ping();
        setInterval(ping, 15000);

        init();
    </script>
</body>
</html>
